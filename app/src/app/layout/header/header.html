<header class="site-header">
    <mat-toolbar class="toolbar">

        <a class="brand" routerLink="/">
            <img src="http://localhost:3000/uploads/logo.png" class="logo-img">
        </a>

        <nav class="desktop-nav">
            <a mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
                <mat-icon>home</mat-icon>
                Inicio
            </a>

            <button mat-button [matMenuTriggerFor]="menuListados">
                <mat-icon>list</mat-icon>
                Listados
            </button>
        </nav>

        <span class="spacer"></span>

        <button class="mobile-menu-button" mat-icon-button [matMenuTriggerFor]="mobileMenu">
            <mat-icon>menu</mat-icon>
        </button>

    </mat-toolbar>
</header>

<mat-menu #menuListados="matMenu">
    @for (item of listados; track item.ruta) {
    <a mat-menu-item [routerLink]="item.ruta">
        <mat-icon>{{ item.icono }}</mat-icon>
        <span>{{ item.nombre }}</span>
    </a>
    }
</mat-menu>

<mat-menu #mobileMenu="matMenu">
    <a mat-menu-item routerLink="/">
        <mat-icon>home</mat-icon>
        <span>Inicio</span>
    </a>

    @for (item of listados; track item.ruta) {
    <a mat-menu-item [routerLink]="item.ruta">
        <mat-icon>{{ item.icono }}</mat-icon>
        <span>{{ item.nombre }}</span>
    </a>
    }
</mat-menu>
