<section class="page-header">
    <span class="eyebrow">Catálogo</span>
    <h1>Videojuegos disponibles</h1>
    <p>
        Listado de videojuegos.
    </p>
</section>
<section class="filters">
    <mat-form-field appearance="outline">
        <mat-label>Buscar videojuego</mat-label>
        <input matInput [ngModel]="search()" 
            (ngModelChange)="search.set($event)"
            placeholder="Ejemplo: Mario, aventura, carreras" />
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

            }
        </mat-select>
    </mat-form-field> -->

</section>
<!-- <div class="result-summary">
    {{ totalVideojuegos() }} videojuegos encontrados
</div> -->
@if(loading()){
<div class="state">
    <mat-spinner diameter="42" />
    <p>Cargando videojuegos...</p>
</div>
}@else if (error()) {
<div class="state error">
    <mat-icon>error</mat-icon>
    <p>{{ error() }} </p>
</div>
}

<section class="games-grid">
    @for (game of servicios(); track game.id) {
    <mat-card class="game-card">
        <!-- <img mat-card-image [src]="getImageUrl(game.imagen)" [alt]="game.nombre" /> -->
        <mat-card-content>
            <!-- <span class="category">
                {{game.servicio || 'Sin Categoría'}}
            </span> -->
            <h2>{{ game.servicio }} </h2>
            <p> {{ game.descripcion }} </p>
            <!-- <div class="game-meta">
                <strong>&cent;{{game.precio}} </strong>
                <span>Stock: {{game.stock}}</span>
            </div> -->
        </mat-card-content>
        <mat-card-actions align="end">
            <a mat-stroked-button color="primary" [routerLink]="['/videojuegos',game.id]"  class="view-icon-button">
                Detalle<mat-icon>more_horiz</mat-icon>
            </a>
        </mat-card-actions>
    </mat-card>
    }
</section>
