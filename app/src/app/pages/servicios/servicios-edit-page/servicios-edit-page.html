<section class="page-container">
    <header class="page-header">
        <h1>Actualizar servicio</h1>
        <p>Modifique los datos registrados del servicio.</p>
    </header>

    @if (loading()) {
    <div class="loading-state">
        <mat-spinner diameter="42" />
        <p>Cargando información del servicio...</p>
    </div>
    } @else {
    @if (error()) {
    <div class="error-message">
        <mat-icon>error</mat-icon>
        <p>{{ error() }}</p>
    </div>
    }

    @if (servicio()) {
    <app-servicio-form [servicio]="servicio()" [categorias]="categorias()" [profesionales]="profesionales()"
        [especialidades]="especialidades()" [saving]="saving()" (guardar)="guardar($event)" (cancelar)="cancelar()" />
    }
    }

</section>
