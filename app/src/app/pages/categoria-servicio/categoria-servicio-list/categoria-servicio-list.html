<div class="page-container">

    <a class="back-btn" routerLink="/">
        ← Volver
    </a>

    <div class="page-header">
        <h1>Categorías de servicio</h1>
        <p>Administra las categorías disponibles dentro de la plataforma.</p>
    </div>

    <app-filtros-generales
        [showSearch]="true"
        [showStatus]="true"
        (searchChange)="onBuscarChange($event)"
        (statusChange)="onEstadoChange($event)"
    />

    @if (loading()) {
        <div class="status-card">
            Cargando categorías...
        </div>
    }

    @if (error()) {
        <div class="status-card error">
            {{ error() }}
        </div>
    }

    @if (!loading() && !error()) {
        <app-tabla-listado
            [columnas]="columnas"
            [datos]="categorias()"
            rutaDetalle="/categoria-servicio"
            (cambiarEstado)="cambiarEstado($event)"
        />
    }

</div>
