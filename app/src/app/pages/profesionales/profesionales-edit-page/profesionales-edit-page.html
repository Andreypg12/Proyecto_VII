<section class="page-container">
    <header class="page-header">
        <h1>Actualizar profesional</h1>
        <p>Modifique los datos registrados del profesional.</p>
    </header>

    @if (loading()) {
    <div class="loading-state">
        <mat-spinner diameter="42" />
        <p>Cargando información del profesional...</p>
    </div>
    } @else {
    @if (error()) {
    <div class="error-message">
        <mat-icon>error</mat-icon>
        <p>{{ error() }}</p>
    </div>
    }

    @if (profesional()) {
    <app-profesional-form [profesional]="profesional()" [especialidades]="especialidades()" [saving]="saving()"
        (guardar)="guardar($event)" (cancelar)="cancelar()" />
    }
    }
</section>
