<div class="page-container">

    <a class="back-btn" routerLink="/">
        ← Volver
    </a>

    <div class="page-header">
        <h1>Especialidades</h1>
        <p>Administra las especialidades disponibles dentro de la plataforma.</p>
    </div>

    <app-filtros-generales [showSearch]="true" [showStatus]="true" (searchChange)="onBuscarChange($event)"
        (statusChange)="onEstadoChange($event)" />

    @if (loading()) {
    <div class="status-card">
        Cargando especialidades...
    </div>
    }

    @if (error()) {
    <div class="status-card error">
        {{ error() }}
    </div>
    }

    @if (!loading() && !error()) {
    <app-tabla-listado [columnas]="columnas" [datos]="especialidadesFiltradas()" rutaDetalle="/especialidades"
        (cambiarEstado)="cambiarEstado($event)" />
    }

</div>
